name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zslab-shop

jobs:
  # ── Build & push images ──────────────────────────────────────────
  build:
    name: Build Docker images (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend, socket]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:stg,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:stg-${{ github.sha }}
          cache-from: type=gha,scope=stg-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=stg-${{ matrix.service }}

  # ── Deploy to staging server ─────────────────────────────────────
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            set -e
            cd /home/zslab

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.stg.yml pull
            docker compose -f docker-compose.yml -f docker-compose.stg.yml up -d --remove-orphans

            docker compose exec -T api php artisan migrate --force
            docker compose exec -T api php artisan config:cache

            docker image prune -f
            echo "Staging deploy complete: ${{ github.sha }}"
