input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][log_type] == "laravel" {
    # Laravel 로그 파싱: [2026-04-25 10:00:00] production.ERROR: message {...}
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{WORD:env}\.%{LOGLEVEL:log_level}: %{GREEDYDATA:log_message}"
      }
      tag_on_failure => ["_grok_parse_failure"]
    }

    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
    }

    # 주문 이벤트 감지
    if [log_message] =~ /order/ or [log_message] =~ /Order/ {
      mutate { add_tag => ["order_event"] }
    }
  }

  if [fields][log_type] == "nginx" {
    # Nginx JSON 로그 파싱
    json {
      source => "message"
      tag_on_failure => ["_json_parse_failure"]
    }

    if [uri] {
      mutate {
        add_field => { "page_path" => "%{uri}" }
      }
    }
  }

  # 공통: 불필요 필드 제거
  mutate {
    remove_field => ["agent", "ecs", "input", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "zslab-logs-%{[fields][log_type]}-%{+YYYY.MM.dd}"
  }
}
