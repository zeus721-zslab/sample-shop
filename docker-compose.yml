version: "3.9"
networks:
  zslab_net:
    driver: bridge
  portfolio_portfolio_net:
    external: true
volumes:
  mariadb_data:
  redis_data:
  elasticsearch_data:
  caddy_data:
  caddy_certs:
services:
  caddy:
    build: ./docker/caddy
    container_name: zslab_caddy
    restart: unless-stopped
    # 포트 외부 노출 없음 — 포트폴리오 FrankenPHP가 마스터로 프록시
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_certs:/root/.local/share/caddy
    networks:
      - zslab_net
      - portfolio_portfolio_net
    depends_on:
      - frontend
      - api
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: zslab_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://zslab-shop.duckdns.org/api
      - NEXT_PUBLIC_SOCKET_URL=https://zslab-shop.duckdns.org
    networks:
      - zslab_net
    depends_on:
      - api
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zslab_api
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
    volumes:
      - ./backend:/app
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/frankenphp/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - zslab_net
    depends_on:
      - mariadb
      - redis
      - elasticsearch
  socket:
    build: ./socket
    container_name: zslab_socket
    restart: unless-stopped
    env_file: .env
    networks:
      - zslab_net
    depends_on:
      - redis
  mariadb:
    image: mariadb:10.11
    container_name: zslab_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - zslab_net
  redis:
    image: redis:7-alpine
    container_name: zslab_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - zslab_net
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: zslab_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - zslab_net
