events {
    worker_connections 1024;
}

http {
    # ── 로깅 ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Docker 내부 DNS — 업스트림을 시작 시가 아닌 요청 시 해석 ────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── 공통 프록시 헤더 ──────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host               $host;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto  $scheme;
    proxy_set_header    Upgrade            $http_upgrade;
    proxy_set_header    Connection         "upgrade";
    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  60s;

    # ── SSL 공통 설정 ─────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HTTP → HTTPS 리다이렉트 ───────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── zslab.duckdns.org → portfolio_app ────────────────────────────
    server {
        listen 443 ssl;
        server_name zslab.duckdns.org;

        ssl_certificate     /etc/nginx/certs/zslab.duckdns.org/fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/zslab.duckdns.org/privkey.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        location / {
            set $upstream_portfolio http://portfolio_app:80;
            proxy_pass $upstream_portfolio;
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
            proxy_busy_buffers_size 256k;
        }
    }

    # ── zslab-shop.duckdns.org → zslab_caddy ─────────────────────────
    server {
        listen 443 ssl;
        server_name zslab-shop.duckdns.org;

        ssl_certificate     /etc/nginx/certs/zslab-shop.duckdns.org/fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/zslab-shop.duckdns.org/privkey.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # 클라이언트 업로드 크기
        client_max_body_size 50m;

        location / {
            set $upstream_shop http://zslab_caddy:8080;
            proxy_pass $upstream_shop;
        }
    }

    # ── zslab-stg.duckdns.org → zslab_caddy ──────────────────────────
    server {
        listen 443 ssl;
        server_name zslab-stg.duckdns.org;

        ssl_certificate     /etc/nginx/certs/zslab-stg.duckdns.org/fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/zslab-stg.duckdns.org/privkey.key;

        client_max_body_size 50m;

        location / {
            set $upstream_stg http://zslab_caddy:8080;
            proxy_pass $upstream_stg;
        }
    }
}
